  <ellipse cx="60" cy="155" rx="12" ry="22" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <ellipse cx="169" cy="155" rx="12" ry="22" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
</svg>
