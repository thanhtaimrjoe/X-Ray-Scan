    </linearGradient>
  </defs>
  <path d="M36 174 H184 L76 72 Z" fill="url(#xrayFill)" stroke="#8DFBFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
