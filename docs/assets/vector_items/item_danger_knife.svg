  <circle cx="76" cy="158" r="4" fill="url(#xrayFill)" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <circle cx="104" cy="158" r="4" fill="url(#xrayFill)" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <path d="M74 142 L128 120" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
