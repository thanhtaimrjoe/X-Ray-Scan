    </filter>
    <linearGradient id="xrayFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8DFBFF" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#38F6FF" stop-opacity="0.16" />
    </linearGradient>
  </defs>
  <path d="M32 124 C66 96 116 64 184 44 C170 84 132 122 84 148 Z" fill="url(#xrayFill)" stroke="#8DFBFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
