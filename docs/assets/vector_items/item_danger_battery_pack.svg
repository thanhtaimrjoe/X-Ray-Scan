        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="xrayFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8DFBFF" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#38F6FF" stop-opacity="0.16" />
    </linearGradient>
  </defs>
  <rect x="58" y="74" width="118" height="114" rx="14" fill="url(#xrayFill)" stroke="#8DFBFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <rect x="94" y="52" width="44" height="22" rx="5" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <rect x="78" y="96" width="78" height="72" rx="8" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <path d="M98 108 V158 M118 108 V158 M138 108 V158" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
