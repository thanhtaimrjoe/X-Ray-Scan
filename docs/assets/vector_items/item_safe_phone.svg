  <circle cx="120" cy="176" r="7" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
  <path d="M108 62 H132 M102 88 H138 M102 112 H138 M102 136 H138" fill="none" stroke="#38F6FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#fineGlow)" />
